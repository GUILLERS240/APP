<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ventas - TotalBiz 2.0</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#0f0f1a">
</head>
<body>
    <nav class="top-navbar">
        <div class="nav-brand">
            <img src="../images/icons/logo.png" alt="Logo" onerror="this.style.display='none'">
            <h1>TotalBiz 2.0</h1>
        </div>
        <div class="nav-menu" id="topNavMenu"></div>
        <div class="nav-actions">
            <button id="logoutTopBtn" class="logout-btn-nav">🔓 Cerrar Sesión</button>
        </div>
    </nav>

    <nav class="bottom-navbar" id="bottomNavMenu"></nav>

    <main class="main-content">
        <header class="dashboard-header">
            <div class="header-left">
                <div class="logo-area">
                    <h1>💰 Registro de Ventas</h1>
                    <p>Registrar nuevas ventas</p>
                </div>
            </div>
            <div class="header-actions"></div>
        </header>

        <div class="content-area">
            <div class="sale-form" style="background: var(--bg-card); border-radius: var(--radius); padding: 25px; margin-bottom: 30px;">
                <h2>Nueva Venta</h2>
                <form id="saleForm">
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group"><label>Producto *</label><select id="productSelect" required onchange="calculatePrice()"><option value="">Seleccione un producto</option></select></div>
                        <div class="form-group"><label>Cantidad *</label><input type="number" id="quantity" min="1" value="1" required onchange="calculatePrice()"></div>
                    </div>
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div class="form-group"><label>Método de Pago *</label><select id="paymentMethod" required onchange="calculatePrice()"><option value="">Seleccione método</option><option value="USD">USD (Sin extra)</option><option value="CUP_Efectivo">CUP Efectivo (Sin extra)</option><option value="CUP_Transferencia">CUP Transferencia (+15%)</option><option value="MLC">MLC (Sin extra)</option><option value="PayPal">PayPal (+20%)</option><option value="Zelle">Zelle (+20%)</option><option value="TropiPay">TropiPay (+15%)</option></select></div>
                        <div class="form-group"><label>Código del Gestor</label><input type="text" id="sellerCode" placeholder="Ej: GR4" oninput="calculatePrice()"></div>
                    </div>

                    <div class="price-breakdown" style="background: rgba(102,126,234,0.1); border-radius: var(--radius); padding: 20px; margin-top: 20px;">
                        <h3>Desglose de la Venta</h3>
                        <div class="price-line" style="display: flex; justify-content: space-between; padding: 8px 0;"><span>Precio base (USD):</span><span id="basePrice">$0.00 USD</span></div>
                        <div class="price-line" style="display: flex; justify-content: space-between; padding: 8px 0;"><span>Recargo por método:</span><span id="surcharge">0%</span></div>
                        <div class="price-line total" style="display: flex; justify-content: space-between; padding: 8px 0; font-weight: bold; font-size: 18px; border-top: 2px solid var(--primary); margin-top: 10px; padding-top: 10px;"><span>Total a pagar:</span><span id="totalPrice">$0.00</span></div>
                        <div id="commissionInfo" style="display: none; background: rgba(255,193,7,0.15); border-radius: var(--radius-sm); padding: 15px; margin-top: 15px;"><strong>💰 Comisión para gestor:</strong> <span id="commissionAmount">$0.00 CUP</span></div>
                    </div>

                    <div class="form-actions" style="display: flex; gap: 15px; margin-top: 25px;">
                        <button type="submit" class="btn-primary">✅ Registrar Venta</button>
                        <button type="reset" class="btn-danger" onclick="resetForm()">Limpiar</button>
                    </div>
                </form>
            </div>

            <div class="recent-sales-card" style="background: var(--bg-card); border-radius: var(--radius); padding: 20px;">
                <h3>📋 Ventas Recientes</h3>
                <div class="sales-table-container" style="overflow-x: auto;">
                    <table class="sales-table-dashboard" style="width: 100%; border-collapse: collapse;">
                        <thead><tr><th>Fecha</th><th>Producto</th><th>Cantidad</th><th>Método</th><th>Total</th><th>Gestor</th></tr></thead>
                        <tbody id="recentSalesList"><tr><td colspan="6" style="text-align: center;">No hay ventas registradas</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        function resetForm() {
            document.getElementById('saleForm').reset();
            document.getElementById('productSelect').value = '';
            document.getElementById('quantity').value = '1';
            document.getElementById('paymentMethod').value = '';
            document.getElementById('sellerCode').value = '';
            document.getElementById('basePrice').innerText = '$0.00 USD';
            document.getElementById('surcharge').innerText = '0%';
            document.getElementById('totalPrice').innerText = '$0.00';
            document.getElementById('commissionInfo').style.display = 'none';
        }
    </script>

    <script src="../js/database.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/sidebar.js"></script>
    <script src="../js/sales.js"></script>
    <script src="../js/backup.js"></script>
    <script src="../js/icons.js"></script>
    <script src="../js/support.js"></script>
    <script>
        if (!checkAuth()) {}
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js').catch(err => console.error('Error SW:', err));
    </script>
</body>
</html>
